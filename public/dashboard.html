<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hip-Hop | Dashboards</title>

    <link rel="stylesheet" href="./css/dashboards.css">
    <link rel="stylesheet" href="./css/estilo.css" />
    <script src="../js/sessao.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://kit.fontawesome.com/9f7414eb10.js" crossorigin="anonymous"></script>
</head>

<body>

    <div class="janela">
        <div class="header-left">
            <h1>Hip-Hop</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav">
                <h3>Gráficos do Quiz</h3>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
                
            </div>
        </div>

        <div class="dash">
            <div id="graficos">

                <div class="display-block">
                    <h3 class="tituloGraficos" style="color: white; text-align: center; margin-top: 20px;">
                        Engajamento por Pergunta do Quiz
                    </h3>
                    <div class="graph"
                        style="width: 80%; margin: auto; background-color: #111; padding: 20px; border-radius: 10px;">
                        <canvas id="graficoBarrasQuiz"></canvas>
                    </div>
                </div>

                <div class="display-block">
                    <h3 class="tituloGraficos" style="color: white; text-align: center; margin-top: 20px;">
                        Acertos e Erros por Pergunta
                    </h3>
                    <div class="graph"
                        style="width: 80%; margin: auto; background-color: #111; padding: 20px; border-radius: 10px;">
                        <canvas id="graficoAcertos"></canvas>
                    </div>
                </div>

                <div class="display-block">
                    <h3 class="tituloGraficos" style="color: white; text-align: center; margin-top: 20px;">
                        Ranking de Usuários
                    </h3>
                    <div class="graph"
                        style="width: 80%; margin: auto; background-color: #111; padding: 20px; border-radius: 10px;">
                        <canvas id="graficoRanking"></canvas>
                    </div>
                </div>

                <div class="display-block">
                    <h3 class="tituloGraficos" style="color: white; text-align: center; margin-top: 20px;">
                        Taxa de Acerto por Pergunta (%)
                    </h3>
                    <div class="graph"
                        style="width: 80%; margin: auto; background-color: #111; padding: 20px; border-radius: 10px;">
                        <canvas id="graficoTaxa"></canvas>
                    </div>
                </div>

                <div class="display-block">
                    <h3 class="tituloGraficos" style="color: white; text-align: center; margin-top: 20px;">
                        Desempenho por Artista
                    </h3>
                    <div class="graph"
                        style="width: 80%; margin: auto; background-color: #111; padding: 20px; border-radius: 10px;">
                        <canvas id="graficoArtista"></canvas>
                    </div>
                </div>

            </div>
        </div>
    </div>
    </div>

</body>

</html>

<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;
    window.onload = obterDadosQuiz;

    function obterDadosQuiz() {
        fetch("/dashboard/total-respostas", { cache: 'no-store' })
            .then(function (response) {
                if (response.ok) {
                    response.json().then(function (resposta) {
                        plotarGraficoRespostas(resposta);
                        plotarGraficoAcertos(resposta);
                    });
                }
            });
    }

    function plotarGraficoRespostas(resposta) {
        var labels = resposta.map(function (r, i) { return "Perg. " + (i + 1); });
        var votos = resposta.map(function (r) { return r.total_votos; });

        new Chart(document.getElementById('graficoBarrasQuiz'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Total de Respostas',
                    data: votos,
                    backgroundColor: 'rgba(156, 3, 3, 0.6)',
                    borderColor: '#9c0303',
                    borderWidth: 2,
                    borderRadius: 5
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, ticks: { color: '#fff' } },
                    x: { ticks: { color: '#fff' } }
                },
                plugins: { legend: { labels: { color: '#fff' } } }
            }
        });
    }

    function plotarGraficoAcertos(resposta) {
        var labels = resposta.map(function (r, i) { return "Perg. " + (i + 1); });
        var acertos = resposta.map(function (r) { return r.total_acertos; });
        var erros = resposta.map(function (r) { return r.total_votos - r.total_acertos; });

        new Chart(document.getElementById('graficoAcertos'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Acertos',
                        data: acertos,
                        backgroundColor: 'rgba(39, 174, 96, 0.7)',
                        borderColor: '#27ae60',
                        borderWidth: 2,
                        borderRadius: 5
                    },
                    {
                        label: 'Erros',
                        data: erros,
                        backgroundColor: 'rgba(192, 57, 43, 0.7)',
                        borderColor: '#c0392b',
                        borderWidth: 2,
                        borderRadius: 5
                    }
                ]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, ticks: { color: '#fff' } },
                    x: { ticks: { color: '#fff' } },
                    x: { stacked: false, ticks: { color: '#fff' } }
                },
                plugins: { legend: { labels: { color: '#fff' } } }
            }
        });
    }

    function obterDadosQuiz() {
        fetch("/dashboard/total-respostas", { cache: 'no-store' })
            .then(function (response) {
                if (response.ok) {
                    response.json().then(function (resposta) {
                        plotarGraficoRespostas(resposta);
                        plotarGraficoAcertos(resposta);
                    });
                }
            });

        fetch("/dashboard/ranking-usuarios", { cache: 'no-store' })
            .then(function (response) {
                if (response.ok) response.json().then(plotarGraficoRanking);
            });

        fetch("/dashboard/taxa-acerto", { cache: 'no-store' })
            .then(function (response) {
                if (response.ok) response.json().then(plotarGraficoTaxa);
            });

        fetch("/dashboard/acertos-por-artista", { cache: 'no-store' })
            .then(function (response) {
                if (response.ok) response.json().then(plotarGraficoArtista);
            });
    }

    function plotarGraficoRanking(resposta) {
        var labels = resposta.map(function (r) { return r.usuario; });
        var acertos = resposta.map(function (r) { return r.total_acertos; });

        new Chart(document.getElementById('graficoRanking'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Total de Acertos',
                    data: acertos,
                    backgroundColor: 'rgba(52, 152, 219, 0.7)',
                    borderColor: '#3498db',
                    borderWidth: 2,
                    borderRadius: 5
                }]
            },
            options: {
                indexAxis: 'y', // barras horizontais
                scales: {
                    y: { ticks: { color: '#fff' } },
                    x: { beginAtZero: true, ticks: { color: '#fff' } }
                },
                plugins: { legend: { labels: { color: '#fff' } } }
            }
        });
    }

    function plotarGraficoTaxa(resposta) {
        var labels = resposta.map(function (r, i) { return "Perg. " + (i + 1); });
        var taxas = resposta.map(function (r) { return r.taxa_acerto; });

        new Chart(document.getElementById('graficoTaxa'), {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Taxa de Acerto (%)',
                    data: taxas,
                    backgroundColor: 'rgba(241, 196, 15, 0.2)',
                    borderColor: '#f1c40f',
                    borderWidth: 2,
                    pointBackgroundColor: '#f1c40f',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, max: 100, ticks: { color: '#fff', callback: function (v) { return v + '%'; } } },
                    x: { ticks: { color: '#fff' } }
                },
                plugins: { legend: { labels: { color: '#fff' } } }
            }
        });
    }

    function plotarGraficoArtista(resposta) {
        var labels = resposta.map(function (r) { return r.artista; });
        var acertos = resposta.map(function (r) { return r.total_acertos; });
        var erros = resposta.map(function (r) { return r.total_erros; });

        new Chart(document.getElementById('graficoArtista'), {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Acertos',
                        data: acertos,
                        backgroundColor: 'rgba(39, 174, 96, 0.7)',
                        borderColor: '#27ae60',
                        borderWidth: 2,
                        borderRadius: 5
                    },
                    {
                        label: 'Erros',
                        data: erros,
                        backgroundColor: 'rgba(192, 57, 43, 0.7)',
                        borderColor: '#c0392b',
                        borderWidth: 2,
                        borderRadius: 5
                    }
                ]
            },
            options: {
                scales: {
                    y: { beginAtZero: true, ticks: { color: '#fff' } },
                    x: { ticks: { color: '#fff' } }
                },
                plugins: { legend: { labels: { color: '#fff' } } }
            }
        });
    }
</script>
