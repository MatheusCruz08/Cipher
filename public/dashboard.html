<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hip-Hop | Dashboards</title>
    
    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <script src="../js/sessao.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://kit.fontawesome.com/9f7414eb10.js" crossorigin="anonymous"></script>
</head>

<body>

    <div class="janela">
        <div class="header-left">
            <h1>Hip-Hop</h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav">
                <h3>Gráficos do Quiz</h3>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>
        </div>

        <div class="dash">
            <div id="graficos">
                <div class="display-block">
                    <h3 class="tituloGraficos" style="color: white; text-align: center; margin-top: 20px;">
                        Engajamento por Pergunta do Quiz
                    </h3>
                    <div class="graph" style="width: 80%; margin: auto; background-color: #111; padding: 20px; border-radius: 10px;">
                        <canvas id="graficoBarrasQuiz"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>

<script>
    // Alimenta o nome do usuário logado na tela utilizando a sessão da SPTech
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    // Executa a função assim que a página carregar por completo
    window.onload = obterDadosQuiz();

    function obterDadosQuiz() {
        // Faz a requisição para a rota que criamos no back-end
        fetch("/medidas/total-respostas", { cache: 'no-store' })
            .then(function (response) {
                if (response.ok) {
                    response.json().then(function (resposta) {
                        console.log(`Dados recebidos do banco: ${JSON.stringify(resposta)}`);
                        
                        // Passa os dados recebidos para a função que monta o gráfico
                        plotarGrafico(resposta);
                    });
                } else {
                    console.error('Nenhum dado encontrado ou erro na API');
                }
            })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados para o gráfico: ${error.message}`);
            });
    }

    function plotarGrafico(resposta) {
        console.log('Iniciando plotagem do gráfico...');

        // Estruturas vazias para separar o que é texto (eixo X) e o que é número (eixo Y)
        let labelsPerguntas = [];
        let dadosVotos = [];

        // Preenche os vetores com os dados vindos do banco de dados
        for (let i = 0; i < resposta.length; i++) {
            var registro = resposta[i];
            // Simplifica o texto exibido no eixo X para não quebrar o layout (ex: "P1", "P2"...)
            labelsPerguntas.push(`Perg. ${i + 1}`); 
            dadosVotos.push(registro.total_votos);
        }

        // Configuração dos dados do Chart.js
        const dadosGrafico = {
            labels: labelsPerguntas,
            datasets: [{
                label: 'Total de Respostas',
                data: dadosVotos,
                backgroundColor: 'rgba(156, 3, 3, 0.6)', // Vermelho correspondente ao seu #9c0303 com opacidade
                borderColor: '#9c0303',
                borderWidth: 2,
                borderRadius: 5
            }]
        };

        // Configurações visuais gerais do gráfico
        const config = {
            type: 'bar', // Gráfico de Barras verticais
            data: dadosGrafico,
            options: {
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            color: '#fff' // Cor dos números do eixo Y
                        }
                    },
                    x: {
                        ticks: {
                            color: '#fff' // Cor dos nomes do eixo X
                        }
                    }
                },
                plugins: {
                    legend: {
                        labels: {
                            color: '#fff' // Cor da legenda interna
                        }
                    }
                }
            }
        };

        // Instancia o gráfico apontando para o id do canvas
        let meuGrafico = new Chart(
            document.getElementById('graficoBarrasQuiz'),
            config
        );
    }
</script>
